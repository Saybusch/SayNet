name: Build & Push Docker Images

on:
  push:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    env:
      REGISTRY: ghcr.io
      OWNER: ${{ github.repository_owner }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push server
        run: |
          docker build -t $REGISTRY/$OWNER/server:latest ./server
          docker push $REGISTRY/$OWNER/server:latest

      - name: Build & push client
        run: |
          docker build -t $REGISTRY/$OWNER/client:latest ./client
          docker push $REGISTRY/$OWNER/client:latest